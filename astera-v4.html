function getAllP(){var ps=[];Object.keys(DATA).forEach(function(gk){Object.keys(DATA[gk].cats).forEach(function(cat){DATA[gk].cats[cat].forEach(function(p){var x=Object.assign({},p);x.grupKey=gk;x.grupLabel=DATA[gk].label;x.cat=cat;ps.push(x);});});});return ps;}
function findById(id){return getAllP().find(function(p){return p.id===id;})||null;}
function findByMann(m){return getAllP().find(function(p){return p.mann===m;})||null;}
function saveProds(){lsSave(K.products,DATA);}
function syncStockDown(mann,qty){Object.keys(DATA).forEach(function(gk){Object.keys(DATA[gk].cats).forEach(function(cat){DATA[gk].cats[cat].forEach(function(p){if(p.mann===mann)p.stokAdet=Math.max(0,(p.stokAdet||0)-qty);});});});}
function addOrUpdateProd(gk,cat,pData){
  if(!DATA[gk])DATA[gk]={label:gk,subtitle:"",cats:{Hava:[],Yağ:[],Polen:[],Yakıt:[]}};
  if(!DATA[gk].cats[cat])DATA[gk].cats[cat]=[];
  // Önce aynı MANN kodu var mı kontrol et (tüm gruplarda)
  var mannNorm=(pData.mann||"").replace(/[\s\-]/g,"").toLowerCase();
  var oemNorm=(pData.oem||"").replace(/[\s\-\.]/g,"").toLowerCase();
  var existingInGroup=DATA[gk].cats[cat].find(function(p){return p.mann===pData.mann;});
  if(existingInGroup){
    // Aynı grup+cat içinde varsa güncelle
    Object.assign(existingInGroup,pData);
    saveProds();
    return;
  }
  // Diğer gruplarda aynı OEM veya MANN var mı?
  var globalDup=getAllP().find(function(p){
    var pm=(p.mann||"").replace(/[\s\-]/g,"").toLowerCase();
    var po=(p.oem||"").replace(/[\s\-\.]/g,"").toLowerCase();
    return pm===mannNorm||(oemNorm&&oemNorm!=="-"&&po===oemNorm);
  });
  if(globalDup){
    notif("⚠️ Zaten mevcut ("+globalDup.mann+")","red");
    return;
  }
  DATA[gk].cats[cat].push(pData);
  saveProds();
}

function renderML(){

    .map(function(m){var bak=getMBakiye(m.ad);return Object.assign({},m,{bak:bak});})
    .filter(function(m){
      if(dur==="borclu")return m.bak>0.1;
      if(dur==="alacakli")return m.bak<-0.1;
      return true;
    });
  if(cariFlt.siralama==="bakiye")ms.sort(function(a,b){return b.bak-a.bak;});

    el.innerHTML="<div class='fz12 txt2' style='padding:12px'>Sonuç yok</div>";
    return;
  }

  ms.forEach(function(m){
    var bak=m.bak;
    var cls=bak>0.1?"var(--red)":bak<-0.1?"var(--grn)":"var(--txt3)";
    var isActive=m.ad===selMusteri;

function initSign(){var area=g("signArea");var canvas=g("signCanvas");if(!area||!canvas)return;signCanvas=canvas;signCtx=canvas.getContext("2d");canvas.width=area.offsetWidth;canvas.height=area.offsetHeight||90;signCtx.strokeStyle="#1a1917";signCtx.lineWidth=2.5;signCtx.lineCap="round";
  function pos(e){var r=canvas.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
  canvas.onmousedown=function(e){signDrawing=true;var p=pos(e);signCtx.beginPath();signCtx.moveTo(p.x,p.y);if(g("signPh"))g("signPh").style.display="none";};
  canvas.onmousemove=function(e){if(!signDrawing)return;var p=pos(e);signCtx.lineTo(p.x,p.y);signCtx.stroke();};
  canvas.onmouseup=function(){signDrawing=false;};
  canvas.ontouchstart=function(e){e.preventDefault();signDrawing=true;var p=pos(e);signCtx.beginPath();signCtx.moveTo(p.x,p.y);if(g("signPh"))g("signPh").style.display="none";};
  canvas.ontouchmove=function(e){e.preventDefault();if(!signDrawing)return;var p=pos(e);signCtx.lineTo(p.x,p.y);signCtx.stroke();};
  canvas.ontouchend=function(){signDrawing=false;};
}

function updateSAKargo(saId,sid){
  var s=SATINALMA.find(function(x){return x.id===saId;});if(!s)return;
  var inp=document.getElementById("kargo_"+sid);if(!inp)return;
  var newKargo=parseFloat(inp.value)||0;
  s.kargoMasraf=newKargo;
  var kdvsizTop=s.kdvDahil?s.tutarBrut/1.2:s.tutarBrut;
  // Update stat display
  var kstat=document.getElementById("kargoStat_"+sid);if(kstat)kstat.textContent=fmt(newKargo)+"₺";
  // Recalculate each product row costs & update DATA
  if(s.urunler)s.urunler.forEach(function(u){
    var alisKdvDahil=u.birimAlis;
    var kargoPayi=kdvsizTop>0?newKargo*alisKdvDahil/kdvsizTop:0;
    var maliyet=alisKdvDahil+kargoPayi;
    u.maliyet=maliyet;
    var mk=u.mann.replace(/[\s]/g,"_");
    var kpEl=document.getElementById("kpay_"+sid+"_"+mk);
    var myEl=document.getElementById("maly_"+sid+"_"+mk);
    if(kpEl)kpEl.textContent=fmt(kargoPayi)+"₺";

    if(u.grupKey&&u.tur&&DATA[u.grupKey]&&DATA[u.grupKey].cats[u.tur]){
      var prod=DATA[u.grupKey].cats[u.tur].find(function(p){return p.mann===u.mann;});
      if(prod)prod.maliyet=maliyet;
    }
  });

function renderKar(){
  var now=new Date(),t1="";
  if(karFlt==="haftalik"){var d=new Date(now);d.setDate(d.getDate()-7);t1=d.toISOString().split("T")[0];}
  else if(karFlt==="aylik"){t1=now.getFullYear()+"-"+(String(now.getMonth()+1).padStart(2,"0"))+"-01";}
  else if(karFlt==="yillik"){t1=now.getFullYear()+"-01-01";}
  var filtered=SATIS.filter(function(s){return !t1||s.tarih>=t1;});
  var satisKdvHaric=filtered.reduce(function(a,s){return a+s.toplam/(1+(s.kdvOrani||0));},0);
  var satisKdv=filtered.reduce(function(a,s){return a+s.toplam*(s.kdvOrani||0)/(1+(s.kdvOrani||0));},0);
  var toplamSatis=filtered.reduce(function(a,s){return a+s.toplam;},0);
  var brutKar=filtered.reduce(function(a,s){return a+s.kar;},0);
  var giderTop=HARCAMALAR.reduce(function(a,h){return a+h.tutar;},0);
  var netKar=brutKar-giderTop;
  var alisKdv=SATINALMA.filter(function(s){return !t1||s.tarih>=t1;}).reduce(function(a,s){return s.kdvDahil?a+(s.tutarBrut-s.tutarBrut/1.2):a;},0);
  var kdvFark=satisKdv-alisKdv;
  var urunKar={};filtered.forEach(function(s){if(!urunKar[s.mann])urunKar[s.mann]={mann:s.mann,satis:0,maliyet:0,adet:0};urunKar[s.mann].satis+=s.toplam;urunKar[s.mann].maliyet+=s.maliyet*s.adet;urunKar[s.mann].adet+=s.adet;});
  var urunRows=Object.values(urunKar).sort(function(a,b){return (b.satis-b.maliyet)-(a.satis-a.maliyet);});
  g("karContent").innerHTML="<div class='g4 mb12'>"
    +"<div class='stat'><div class='stat-lbl'>Satış (KDV Hariç)</div><div class='stat-val'>"+fmt(satisKdvHaric)+"₺</div></div>"
    +"<div class='stat'><div class='stat-lbl'>Brüt Kâr</div><div class='stat-val grn'>"+fmt(brutKar)+"₺</div></div>"
    +"<div class='stat'><div class='stat-lbl'>Toplam Gider</div><div class='stat-val red'>"+fmt(giderTop)+"₺</div></div>"
    +"<div class='stat'><div class='stat-lbl'>Net Kâr</div><div class='stat-val "+(netKar>=0?"grn":"red")+"'>"+fmt(netKar)+"₺</div></div>"
    +"</div>"
    +"<div class='card mb12'><div class='card-hdr'><div class='card-hdr-t'>KDV Özeti</div></div><div class='card-body'>"
    +"<div class='flex jb ic'><span class='fz12'>Satışlardaki KDV (Tahsilat)</span><span class='mono fw7 grn' style='color:var(--grn)'>"+fmt(satisKdv)+"₺</span></div><div class='sep'></div>"
    +"<div class='flex jb ic'><span class='fz12'>Alışlardaki KDV (Ödenen)</span><span class='mono fw7 red' style='color:var(--red)'>"+fmt(alisKdv)+"₺</span></div><div class='sep'></div>"
    +"<div class='flex jb ic'><span class='fz12 fw7'>KDV Farkı (Devlet'e Borç / Alacak)</span><span class='mono fw8' style='color:"+(kdvFark>0?"var(--red)":"var(--grn)")+"'>"+fmt(kdvFark)+"₺ "+(kdvFark>0?"(Borç)":"(Alacak)")+"</span></div>"
    +"</div></div>"
    +"<div class='card'><div class='card-hdr'><div class='card-hdr-t'>Ürün Bazlı Kâr/Zarar</div></div><div class='tbl-wrap'><table class='tbl'><thead><tr><th>MANN NO</th><th class='c'>ADET</th><th class='r'>SATIŞ</th><th class='r'>MALİYET</th><th class='r'>KÂR</th></tr></thead><tbody>"
    +urunRows.map(function(u){var kar=u.satis-u.maliyet;return"<tr><td class='mono fw7'>"+u.mann+"</td><td class='c'>"+u.adet+"</td><td class='mono r'>"+fmt(u.satis)+"₺</td><td class='mono r'>"+fmt(u.maliyet)+"₺</td><td class='mono r "+(kar>=0?"":"red")+"'>"+fmt(kar)+"₺</td></tr>";}).join("")
    +"</tbody></table></div></div>";
}

// ====== ÜRÜN YÖNETİMİ ======
var urunTab="liste";


function urunSwitch(t){urunTab=t;renderUrunTab();}

function pgUrun(){
  var cont=g("content");
  cont.innerHTML="<div class='ctabs' id='urunTabBar'></div><div id='urunContent'></div>";
  var tabs=[["liste","Ürün Listesi"],["ekle","+ Ekle"],["guncelle","Güncelle"],["grup","Araç Grubu"]];
  var tabBar=document.getElementById("urunTabBar");
  tabs.forEach(function(t){
    var el=document.createElement("div");
    el.className="ct"+(urunTab===t[0]?" active":"");
    el.textContent=t[1];
    el.onclick=function(){urunTab=t[0];tabBar.querySelectorAll(".ct").forEach(function(e){e.classList.remove("active");});el.classList.add("active");renderUrunTab();};
    tabBar.appendChild(el);
  });
  renderUrunTab();
}
function urunSwitch(t,el){urunTab=t;document.querySelectorAll(".ct").forEach(function(e){e.classList.remove("active");});el.classList.add("active");renderUrunTab();}
function renderUrunTab(){
  var el=g("urunContent");
  if(urunTab==="liste"){
    var ps=getAllP();
    el.innerHTML="<div class='toolbar'><input class='srch flex1' id='ulQ' placeholder='🔍 Ara...' oninput='filterUL()'></div>"
      +"<div class='card'><div class='tbl-wrap'><table class='tbl' id='ulTbl'><thead><tr><th>MANN</th><th>OEM</th><th>GRUP</th><th>TÜR</th><th class='r'>ALIŞ</th><th class='r'>TOPTAN</th><th class='r'>STOK</th><th class='c'>DURUM</th></tr></thead><tbody id='ulTbody'>"
      +ps.map(function(p){return"<tr><td class='mono fw7'>"+p.mann+"</td><td class='mono fz10'>"+p.oem+"</td><td class='fz11'>"+p.grupLabel+"</td><td><span class='badge "+(p.tur==="Hava"?"grn":p.tur==="Yağ"?"amb":"pur")+"'>"+p.tur+"</span></td><td class='mono r'>"+fmt(p.alis||0)+"</td><td class='mono r'>"+fmt(p.price||0)+"</td><td class='mono r'>"+( p.stokAdet||0)+"</td><td class='c' style='font-size:17px'>"+(p.stokAdet<20?"😡":p.stokAdet<=50?"😐":"😂")+"</td></tr>";}).join("")
      +"</tbody></table></div></div>";
  }else if(urunTab==="ekle"){
    var gOpts=Object.keys(DATA).map(function(k){return"<option value='"+k+"'>"+DATA[k].label+"</option>";}).join("");
    el.innerHTML="<div class='card'><div class='card-hdr'><div class='card-hdr-t'>Yeni Ürün Ekle</div></div><div class='card-body'>"
      +"<div class='fr'><div class='fg'><label>Araç Grubu</label><select id='au_g'>"+gOpts+"</select></div><div class='fg'><label>Tür</label><select id='au_t'><option>Hava</option><option>Yağ</option><option>Polen</option><option>Yakıt</option></select></div></div>"
      +"<div class='fr c1'><div class='fg'><label>Ürün Adı / Araç Uyumu</label><input type='text' id='au_n' placeholder='Renault Megane III 1.5 dCi...'></div></div>"
      +"<div class='fr'><div class='fg'><label>OEM Kodu</label><input type='text' id='au_oem'></div><div class='fg'><label>MANN Kodu</label><input type='text' id='au_mann'></div></div>"
      +"<div class='fr c3'><div class='fg'><label>Alış (KDV Hariç ₺)</label><input type='number' id='au_alis' step='0.01' value='0'></div><div class='fg'><label>Toptan Fiyat (₺)</label><input type='number' id='au_toptan' step='0.01' value='0'></div><div class='fg'><label>Başlangıç Stok</label><input type='number' id='au_stok' value='0' min='0'></div></div>"
      +"<div class='fr c1'><div class='fg'><label>Görsel URL</label><input type='text' id='au_img'></div></div>"
      +"<div class='fr c1'><div class='fg'><label>Uyumlu Araçlar</label><textarea id='au_cars' placeholder='VW Golf V, Jetta II...'></textarea></div></div>"
      +"<button class='btn btn-grn' id='saveNewPBtn'>✅ Ürün Ekle</button></div></div>";
    setTimeout(function(){var btn=document.getElementById("saveNewPBtn");if(btn)btn.onclick=saveNewP;},30);
  }else if(urunTab==="guncelle"){
    var gOpts2=Object.keys(DATA).map(function(k){return"<option value='"+k+"'>"+DATA[k].label+"</option>";}).join("");
    el.innerHTML="<div class='card'><div class='card-body'>"
      +"<div class='fr'><div class='fg'><label>Araç Grubu</label><select id='ug_g' onchange='loadUrunSel()'>" +gOpts2+"</select></div><div class='fg'><label>Tür</label><select id='ug_t' onchange='loadUrunSel()'><option>Hava</option><option>Yağ</option><option>Polen</option><option>Yakıt</option></select></div></div>"
      +"<div class='fg mb12'><label>Ürün</label><select id='ug_p' onchange='loadUEdit()'><option value=''>-- Seçin --</option></select></div>"
      +"<div id='uEditForm'></div></div></div>";loadUrunSel();
  }else{
    var gOpts3=Object.keys(DATA).map(function(k){return"<div class='flex jb ic' style='padding:8px;border-bottom:1px solid var(--bdr)'><strong>"+DATA[k].label+"</strong><span class='fz11 txt2'>("+k+")</span></div>";}).join("");
    el.innerHTML="<div class='g2'><div class='card'><div class='card-hdr'><div class='card-hdr-t'>Mevcut Gruplar</div></div><div class='card-body'>"+gOpts3+"</div></div>"
      +"<div class='card'><div class='card-hdr'><div class='card-hdr-t'>Yeni Grup Ekle</div></div><div class='card-body'>"
      +"<div class='fr c1'><div class='fg'><label>Grup Kodu (örn: BMW)</label><input type='text' id='ag_k' placeholder='BMW'></div></div>"
      +"<div class='fr c1'><div class='fg'><label>Grup Adı</label><input type='text' id='ag_l' placeholder='BMW Grubu'></div></div>"
      +"<div class='fr c1'><div class='fg'><label>Alt Başlık</label><input type='text' id='ag_s' placeholder='BMW · Mini'></div></div>"
      +"<button class='btn btn-grn' id='saveGrupBtn'>✅ Ekle</button></div></div></div>";
    setTimeout(function(){var btn=document.getElementById("saveGrupBtn");if(btn)btn.onclick=saveGrup;},30);
  }
}
function filterUL(){var q=(g("ulQ")&&g("ulQ").value||"").toLowerCase();if(g("ulTbody"))g("ulTbody").querySelectorAll("tr").forEach(function(r){r.style.display=!q||r.textContent.toLowerCase().includes(q)?"":"none";});}
function saveNewP(){
  var gk=g("au_g").value,tur=g("au_t").value,name=g("au_n").value.trim(),oem=g("au_oem").value.trim(),mann=g("au_mann").value.trim(),alis=parseFloat(g("au_alis").value)||0,toptan=parseFloat(g("au_toptan").value)||0,stok=parseInt(g("au_stok").value)||0,img=g("au_img").value.trim(),cars=g("au_cars").value.trim();
  if(!name||!mann){notif("Ad ve MANN zorunludur","red");return;}
  if(!DATA[gk])return;
  // ── OEM ve MANN tekrar kontrolü ──
  var allProds=getAllP();
  var mannNorm=mann.replace(/[\s\-]/g,"").toLowerCase();
  var oemNorm=(oem||"").replace(/[\s\-\.]/g,"").toLowerCase();
  var duplicate=allProds.find(function(p){
    var pm=(p.mann||"").replace(/[\s\-]/g,"").toLowerCase();
    var po=(p.oem||"").replace(/[\s\-\.]/g,"").toLowerCase();
    return pm===mannNorm||(oemNorm&&oemNorm!=="-"&&po===oemNorm);
  });
  if(duplicate){
    notif("⚠️ Bu OEM veya MANN kodu zaten mevcut: "+duplicate.mann+" ("+duplicate.grupLabel+"→"+duplicate.tur+")","red");
    return;
  }
  if(!DATA[gk].cats[tur])DATA[gk].cats[tur]=[];
  DATA[gk].cats[tur].push({id:uid(),name:name,oem:oem||"-",mann:mann,price:toptan,alis:alis,maliyet:alis,stokAdet:stok,img:img,stock:stok>0,tur:tur,modeller:cars});
  saveProds();
  notif("Ürün eklendi ve müşteri paneline aktarıldı: "+mann,"grn");
  renderUrunTab();
}
function loadUrunSel(){var gk=g("ug_g")&&g("ug_g").value,tur=g("ug_t")&&g("ug_t").value;if(!gk||!DATA[gk])return;var ps=DATA[gk].cats[tur]||[];g("ug_p").innerHTML="<option value=''>-- Seçin --</option>"+ps.map(function(p){return"<option value='"+p.id+"'>"+p.mann+" – "+p.name.substring(0,35)+"</option>";}).join("");g("uEditForm").innerHTML="";}
function loadUEdit(){
  var id=g("ug_p").value;
  if(!id){g("uEditForm").innerHTML="";return;}
  var p=findById(id);if(!p)return;
  g("uEditForm").innerHTML=
    "<hr class='sep'>"
    +"<div class='fr'><div class='fg'><label>OEM</label><input type='text' id='ue_oem' value='"+p.oem+"'></div>"
    +"<div class='fg'><label>MANN</label><input type='text' id='ue_mn' value='"+p.mann+"' readonly style='background:var(--sur2)'></div></div>"
    +"<div class='fr c3'><div class='fg'><label>Alış (₺)</label><input type='number' id='ue_alis' value='"+(p.alis||0)+"' step='0.01'></div>"
    +"<div class='fg'><label>Toptan (₺)</label><input type='number' id='ue_toptan' value='"+(p.price||0)+"' step='0.01'></div>"
    +"<div class='fg'><label>Stok</label><input type='number' id='ue_stok' value='"+(p.stokAdet||0)+"'></div></div>"
    +"<div class='fr c1'><div class='fg'><label>Görsel URL</label><input type='text' id='ue_img' value='"+(p.img||"")+"'></div></div>"
    +"<div class='fr c1'><div class='fg'><label>Uyumlu Araçlar</label><textarea id='ue_cars'>"+(p.modeller||"")+"</textarea></div></div>"
    +"<div class='flex gap7'><button class='btn btn-grn' id='ueGBtn'>💾 Güncelle</button><button class='btn btn-red' id='ueSBtn'>🗑 Sil</button></div>";
  var gb=document.getElementById("ueGBtn");
  var sb=document.getElementById("ueSBtn");
  if(gb)gb.onclick=function(){updateP(id);};
  if(sb)sb.onclick=function(){deleteP(id);};
}
function updateP(id){var gks=Object.keys(DATA);for(var i=0;i<gks.length;i++){var cats=DATA[gks[i]].cats;var cks=Object.keys(cats);for(var j=0;j<cks.length;j++){var arr=cats[cks[j]];for(var k=0;k<arr.length;k++){if(arr[k].id===id){arr[k].oem=g("ue_oem").value;arr[k].alis=parseFloat(g("ue_alis").value)||0;arr[k].price=parseFloat(g("ue_toptan").value)||0;arr[k].stokAdet=parseInt(g("ue_stok").value)||0;arr[k].img=g("ue_img").value;arr[k].modeller=g("ue_cars").value;arr[k].stock=(arr[k].stokAdet>0);}}}}saveProds();notif("Güncellendi","grn");}
function deleteP(id){if(!confirm("Silinsin mi?"))return;var gks=Object.keys(DATA);for(var i=0;i<gks.length;i++){var cats=DATA[gks[i]].cats;var cks=Object.keys(cats);for(var j=0;j<cks.length;j++){cats[cks[j]]=cats[cks[j]].filter(function(p){return p.id!==id;});}}saveProds();notif("Silindi","red");renderUrunTab();}
function saveGrup(){var k=(g("ag_k").value||"").toUpperCase().trim(),l=(g("ag_l").value||"").trim(),s=(g("ag_s").value||"").trim();if(!k||!l){notif("Kod ve ad zorunlu","red");return;}if(DATA[k]){notif("Bu kod zaten var","red");return;}DATA[k]={label:l,subtitle:s,cats:{Hava:[],Yağ:[],Polen:[],Yakıt:[]}};saveProds();notif("Grup eklendi","grn");renderUrunTab();}

function saveLogo(){var u=(g("logoUrl").value||"").trim();lsSave(K.logo,u);if(u){g("sbLogoImg").src=u;g("sbLogoImg").style.display="block";g("sbLogoFb").style.display="none";}else{g("sbLogoImg").style.display="none";g("sbLogoFb").style.display="flex";}notif("Logo güncellendi","grn");}
function saveSettings(){WA=g("waNum").value||WA;notif("Kaydedildi","grn");}
function resetAll(){if(!confirm("TÜM VERİLER SİLİNECEK!"))return;if(!confirm("GERÇEKTEN EMİN MİSİNİZ?"))return;Object.values(K).forEach(function(k){localStorage.removeItem(k);});location.reload();}

  g("modalOv").addEventListener("click",function(e){if(e.target===this)closeModal();});
  setInterval(checkOrders,30000);
};
